<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fafafa;
    }

    .header {
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 32px 0;
      color: #999;
    }

    .error {
      text-align: center;
      padding: 32px 0;
      color: #ff6600;
      font-size: 14px;
    }

    .result {
      padding: 16px 0;
    }

    .score {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .app-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .summary {
      font-size: 13px;
      line-height: 1.5;
      color: #ccc;
      margin-bottom: 16px;
    }

    .link {
      display: block;
      text-align: center;
      padding: 10px;
      background: #fafafa;
      color: #0f0f0f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      margin-top: 12px;
      border-radius: 6px;
    }

    .link:hover {
      opacity: 0.8;
    }

    .no-app {
      text-align: center;
      padding: 32px 16px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Snitch</div>
    <div class="subtitle">App Privacy Checker</div>
  </div>
  <div id="content">
    <div class="loading">Checking...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
